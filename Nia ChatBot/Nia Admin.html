  <script type="text/babel">
/* ── NIA Admin Console — React App ── */
const { useState, useRef, useEffect } = React;

/* ─── Shared tiny components ─── */
const Badge = ({ children, color = "default" }) => {
  const colors = {
    default: "rgba(255,255,255,0.08) #aaa",
    active: "rgba(16,185,129,0.15) #10b981",
    suspended: "rgba(239,68,68,0.15) #ef4444",
    provisioning: "rgba(245,158,11,0.15) #f59e0b",
    professional: "rgba(99,102,241,0.15) #818cf8",
    enterprise: "rgba(168,85,247,0.15) #c084fc",
    starter: "rgba(255,255,255,0.08) #888",
    widget: "rgba(99,102,241,0.12) #818cf8",
    telegram: "rgba(14,165,233,0.12) #38bdf8",
  };
  const [bg, fg] = (colors[color] || colors.default).split(" ");
  return <span style={{ background: bg, color: fg, padding: "2px 9px", borderRadius: 20, fontSize: 11, fontWeight: 600, letterSpacing: ".03em", whiteSpace: "nowrap" }}>{children}</span>;
};

const Toggle = ({ value, onChange }) => (
  <button onClick={() => onChange(!value)} style={{ width: 36, height: 20, borderRadius: 10, border: "none", cursor: "pointer", background: value ? "#6366f1" : "rgba(255,255,255,0.12)", position: "relative", transition: "background .2s", flexShrink: 0 }}>
    <span style={{ position: "absolute", top: 3, left: value ? 19 : 3, width: 14, height: 14, borderRadius: "50%", background: "#fff", transition: "left .2s", display: "block" }} />
  </button>
);

const Btn = ({ children, variant = "secondary", onClick, small, disabled }) => {
  const styles = {
    primary: { background: "#6366f1", color: "#fff", border: "none" },
    secondary: { background: "rgba(255,255,255,0.07)", color: "#ccc", border: "1px solid rgba(255,255,255,0.1)" },
    ghost: { background: "transparent", color: "#888", border: "1px solid rgba(255,255,255,0.07)" },
    danger: { background: "rgba(239,68,68,0.12)", color: "#ef4444", border: "1px solid rgba(239,68,68,0.25)" },
  };
  return <button onClick={onClick} disabled={disabled} style={{ ...styles[variant], padding: small ? "5px 12px" : "7px 16px", borderRadius: 7, fontSize: small ? 12 : 13, fontWeight: 500, cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? .5 : 1, display: "inline-flex", alignItems: "center", gap: 6, whiteSpace: "nowrap", fontFamily: "inherit" }}>{children}</button>;
};

const Field = ({ label, children, hint }) => (
  <div style={{ marginBottom: 16 }}>
    <label style={{ display: "block", fontSize: 12, color: "#888", marginBottom: 5, letterSpacing: ".04em" }}>{label}</label>
    {children}
    {hint && <p style={{ fontSize: 11, color: "#555", marginTop: 4 }}>{hint}</p>}
  </div>
);

const Input = ({ value, onChange, placeholder, mono, type = "text" }) => (
  <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
    style={{ width: "100%", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 7, padding: "8px 12px", color: "#e2e2f0", fontSize: 13, fontFamily: mono ? "'IBM Plex Mono', monospace" : "inherit", outline: "none", boxSizing: "border-box" }} />
);

const Textarea = ({ value, onChange, rows = 4, placeholder, mono }) => (
  <textarea value={value} onChange={e => onChange(e.target.value)} rows={rows} placeholder={placeholder}
    style={{ width: "100%", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 7, padding: "8px 12px", color: "#e2e2f0", fontSize: 13, fontFamily: mono ? "'IBM Plex Mono', monospace" : "inherit", outline: "none", resize: "vertical", boxSizing: "border-box" }} />
);

const Sel = ({ value, onChange, options }) => (
  <select value={value} onChange={e => onChange(e.target.value)}
    style={{ background: "#1a1a24", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 7, padding: "8px 12px", color: "#e2e2f0", fontSize: 13, fontFamily: "inherit", outline: "none", width: "100%" }}>
    {options.map(o => <option key={o.value || o} value={o.value || o}>{o.label || o}</option>)}
  </select>
);

const Sparkline = ({ data, color = "#6366f1", height = 40 }) => {
  if (!data || data.length < 2) return <div style={{ height }} />;
  const max = Math.max(...data), min = Math.min(...data);
  const w = 200, h = height;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / (max - min || 1)) * (h - 4) - 2}`).join(" ");
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
      <polyline points={`0,${h} ${pts} ${w},${h}`} fill={`${color}18`} strokeWidth="0" />
    </svg>
  );
};

const StatCard = ({ label, value, sub, color = "#6366f1", spark }) => (
  <div style={{ background: "#111118", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: "18px 20px", flex: 1, minWidth: 160 }}>
    <p style={{ fontSize: 11, color: "#666", letterSpacing: ".06em", textTransform: "uppercase", marginBottom: 8 }}>{label}</p>
    <p style={{ fontSize: 26, fontWeight: 600, color, marginBottom: 2 }}>{value}</p>
    {sub && <p style={{ fontSize: 12, color: "#555" }}>{sub}</p>}
    {spark && <div style={{ marginTop: 10 }}><Sparkline data={spark} color={color} height={32} /></div>}
  </div>
);

        </div>
      </div>
    </div>
    <nav style={{ padding: "12px 10px", flex: 1 }}>
      {NAV.map(n => (
        <button key={n.id} onClick={() => { setScreen(n.id); setTenant(null); }}
          style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", borderRadius: 7, border: "none", cursor: "pointer", background: screen === n.id ? "rgba(99,102,241,0.15)" : "transparent", color: screen === n.id ? "#818cf8" : "#666", fontSize: 13, fontWeight: screen === n.id ? 500 : 400, fontFamily: "inherit", marginBottom: 2, textAlign: "left", transition: "background .15s" }}>
          <span style={{ fontSize: 15 }}>{n.icon}</span> {n.label}
        </button>
      ))}
      {tenant && (
        <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid rgba(255,255,255,0.06)" }}>
          <p style={{ fontSize: 10, color: "#444", letterSpacing: ".08em", padding: "0 12px", marginBottom: 8 }}>TENANT ACTIVO</p>
          <div style={{ padding: "10px 12px", borderRadius: 7, background: "rgba(255,255,255,0.04)" }}>
            <p style={{ fontSize: 12, color: "#818cf8", fontWeight: 500, marginBottom: 2 }}>{tenant.id}</p>
            <p style={{ fontSize: 11, color: "#555" }}>{tenant.name.slice(0, 28)}…</p>
          </div>
        </div>

    </nav>
    <div style={{ padding: "14px 20px", borderTop: "1px solid rgba(255,255,255,0.06)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ width: 26, height: 26, borderRadius: "50%", background: "rgba(99,102,241,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#818cf8" }}>SA</div>
        <div>
          <p style={{ fontSize: 12, color: "#ccc" }}>Super Admin</p>
          <p style={{ fontSize: 10, color: "#444" }}>v2.4.1</p>
        </div>
      </div>
    </div>
  </aside>
);

        <StatCard label="Mensajes (30d)" value={totalMsgs.toLocaleString()} sub="todos los canales" color="#818cf8" />

/* ─── FSM Tab ─── */
const FSMTab = ({ tenant }) => {
  const fsm = NIA.fsm[tenant.id] || { intents: [], transitions: [], states: [], skills: [] };
  const [selIntent, setSelIntent] = useState(null);
  const [tab, setTab] = useState("transitions");
  const ACTION_COLORS = { faq: "#818cf8", recommend: "#10b981", handoff: "#f87171", discovery: "#f59e0b", static_reply: "#888", nps: "#c084fc", complaint: "#fb923c", conversational: "#38bdf8" };

  return (
    <div style={{ display: "flex", gap: 0, height: "100%", overflow: "hidden" }}>
      {/* Intents panel */}
      <div style={{ width: 260, borderRight: "1px solid rgba(255,255,255,0.06)", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "16px 16px 12px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: "#888", letterSpacing: ".06em", textTransform: "uppercase" }}>Intents ({fsm.intents.length})</span>
          <Btn small variant="primary">+ Añadir</Btn>
        </div>
        <div style={{ overflowY: "auto", flex: 1 }}>
          {fsm.intents.map(intent => (
            <div key={intent.key} onClick={() => setSelIntent(selIntent?.key === intent.key ? null : intent)}
              style={{ padding: "12px 16px", borderBottom: "1px solid rgba(255,255,255,0.04)", cursor: "pointer", background: selIntent?.key === intent.key ? "rgba(99,102,241,0.1)" : "transparent", transition: "background .15s" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span style={{ width: 7, height: 7, borderRadius: "50%", background: intent.enabled ? "#10b981" : "#555", flexShrink: 0 }} />
                <span style={{ fontSize: 12, fontWeight: 500, color: selIntent?.key === intent.key ? "#818cf8" : "#ccc", flex: 1 }}>{intent.name}</span>
                <span style={{ fontSize: 10, color: "#555", fontFamily: "'IBM Plex Mono', monospace" }}>p{intent.priority}</span>
              </div>
              <p style={{ fontSize: 11, color: "#555", fontFamily: "'IBM Plex Mono', monospace", paddingLeft: 15 }}>{intent.key}</p>
              {selIntent?.key === intent.key && (
                <div style={{ marginTop: 10, paddingLeft: 15 }}>
                  <p style={{ fontSize: 11, color: "#777", lineHeight: 1.6, marginBottom: 8 }}>{intent.description}</p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {intent.examples.slice(0,3).map((ex, i) => (
                      <span key={i} style={{ fontSize: 10, color: "#666", background: "rgba(255,255,255,0.06)", padding: "2px 7px", borderRadius: 4 }}>{ex}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Right panel: transitions / states / skills */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ padding: "12px 20px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", gap: 4, alignItems: "center" }}>
          {["transitions","states","skills"].map(t => (
            <button key={t} onClick={() => setTab(t)} style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: tab === t ? "rgba(99,102,241,0.2)" : "transparent", color: tab === t ? "#818cf8" : "#555", fontSize: 12, fontWeight: tab === t ? 600 : 400, cursor: "pointer", fontFamily: "inherit", textTransform: "capitalize" }}>{t}</button>
          ))}
          <div style={{ flex: 1 }} />
          {tab === "transitions" && <Btn small variant="primary">+ Transición</Btn>}
        </div>

        {tab === "transitions" && (
          <div style={{ overflowY: "auto", flex: 1 }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ borderBottom: "1px solid rgba(255,255,255,0.06)", position: "sticky", top: 0, background: "#111118" }}>
                  {["Intent","Desde estados","Acción","→ Estado","",""].map(h => (
                    <th key={h} style={{ padding: "10px 16px", textAlign: "left", fontSize: 10, color: "#555", fontWeight: 600, letterSpacing: ".06em", textTransform: "uppercase" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {fsm.transitions.map((tr, i) => (
                  <tr key={i} style={{ borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
                    <td style={{ padding: "11px 16px" }}>
                      <span style={{ fontSize: 12, color: "#ccc", fontFamily: "'IBM Plex Mono', monospace", background: "rgba(255,255,255,0.06)", padding: "2px 8px", borderRadius: 4 }}>{tr.intent}</span>
                    </td>
                    <td style={{ padding: "11px 16px" }}>
                      {tr.from_states.length === 0
                        ? <span style={{ fontSize: 11, color: "#555", fontStyle: "italic" }}>cualquier estado</span>
                        : <div style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>{tr.from_states.map(s => <span key={s} style={{ fontSize: 10, background: "rgba(255,255,255,0.07)", color: "#888", padding: "2px 7px", borderRadius: 4 }}>{s}</span>)}</div>
                      }
                    </td>
                    <td style={{ padding: "11px 16px" }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: ACTION_COLORS[tr.action] || "#aaa", background: `${ACTION_COLORS[tr.action] || "#aaa"}18`, padding: "3px 9px", borderRadius: 5 }}>{tr.action}</span>
                    </td>
                    <td style={{ padding: "11px 16px" }}>
                      <span style={{ fontSize: 12, color: "#888", fontFamily: "'IBM Plex Mono', monospace" }}>→ {tr.to_state}</span>
                    </td>
                    <td style={{ padding: "11px 16px" }}><Toggle value={tr.enabled} onChange={() => {}} /></td>
                    <td style={{ padding: "11px 8px" }}><Btn small variant="ghost">✎</Btn></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {tab === "states" && (
          <div style={{ padding: 20, overflowY: "auto", flex: 1 }}>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 24 }}>
              {fsm.states.map(s => (
                <div key={s} style={{ padding: "8px 14px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, fontSize: 12, color: "#ccc", fontFamily: "'IBM Plex Mono', monospace", display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: s === "idle" ? "#10b981" : s === "handoff_active" ? "#f87171" : s === "closed" ? "#555" : "#6366f1" }} />
                  {s}
                </div>
              ))}
            </div>
            <Btn variant="secondary">+ Estado personalizado</Btn>
          </div>
        )}

        {tab === "skills" && (
          <div style={{ padding: 20, overflowY: "auto", flex: 1, display: "flex", flexDirection: "column", gap: 12 }}>
            {fsm.skills.map(sk => (
              <div key={sk.action} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 10, padding: "16px 18px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <span style={{ fontSize: 12, fontWeight: 700, color: ACTION_COLORS[sk.action] || "#aaa" }}>{sk.action}</span>
                  <span style={{ fontSize: 13, fontWeight: 500, color: "#ccc" }}>{sk.name}</span>
                  <div style={{ flex: 1 }} />
                  <Toggle value={sk.enabled} onChange={() => {}} />
                  <Btn small variant="ghost">✎</Btn>
                </div>
                <p style={{ fontSize: 12, color: "#666", marginBottom: sk.entitySchema.length ? 10 : 0 }}>{sk.description}</p>
                {sk.entitySchema.length > 0 && (
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {sk.entitySchema.map(f => <span key={f.name} style={{ fontSize: 11, color: "#818cf8", background: "rgba(99,102,241,0.1)", padding: "2px 8px", borderRadius: 4, fontFamily: "'IBM Plex Mono', monospace" }}>{f.name}: {f.type}</span>)}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

            return (
              <div key={item.intent} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <span style={{ fontSize: 11, color: "#aaa", fontFamily: "'IBM Plex Mono', monospace" }}>{item.intent}</span>
                  <span style={{ fontSize: 11, color: "#666" }}>{item.count.toLocaleString()}</span>
                </div>
                <div style={{ height: 4, background: "rgba(255,255,255,0.06)", borderRadius: 2, overflow: "hidden" }}>
                  <div style={{ width: `${(item.count / max) * 100}%`, height: "100%", background: ["#6366f1","#818cf8","#10b981","#f59e0b","#f87171"][i], borderRadius: 2 }} />
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ─── Channels Tab ─── */
const ChannelsTab = ({ tenant }) => {
  const hasWidget = (tenant.channels || []).includes("widget");
  const hasTelegram = (tenant.channels || []).includes("telegram");
  const Channel = ({ icon, name, desc, active, children }) => (
    <div style={{ background: "#111118", border: `1px solid ${active ? "rgba(99,102,241,0.3)" : "rgba(255,255,255,0.06)"}`, borderRadius: 10, padding: "18px 20px", marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: children ? 16 : 0 }}>
        <span style={{ fontSize: 22 }}>{icon}</span>
        <div style={{ flex: 1 }}>
          <p style={{ fontSize: 14, fontWeight: 500, color: "#e2e2f0" }}>{name}</p>
          <p style={{ fontSize: 12, color: "#555" }}>{desc}</p>
        </div>
        <Badge color={active ? "active" : "default"}>{active ? "Activo" : "Inactivo"}</Badge>
        <Toggle value={active} onChange={() => {}} />
      </div>
      {active && children}
    </div>
  );
  return (
    <div style={{ padding: 24, overflowY: "auto" }}>
      <Channel icon="💬" name="Widget JS" desc="Widget embebido en sitio web via Shadow DOM" active={hasWidget}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Field label="Script de instalación">
            <div style={{ background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 7, padding: "10px 12px", fontFamily: "'IBM Plex Mono',monospace", fontSize: 11, color: "#818cf8" }}>
              {`<script src="https://cdn.nia.app/widget.js">\n  data-tenant="${tenant.id}"\n<\/script>`}
            </div>
          </Field>
          <Field label="API Key del tenant"><Input value="nia_live_••••••••••••3f9a" onChange={() => {}} mono /></Field>
        </div>
      </Channel>
      <Channel icon="✈️" name="Telegram" desc="Canal de Telegram con soporte multi-tenant" active={hasTelegram}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Field label="Bot Token"><Input value={hasTelegram ? "123456:ABC-DEF••••••" : ""} onChange={() => {}} mono /></Field>
          <Field label="Bot Username"><Input value={hasTelegram ? "@nia_turismo_bot" : ""} onChange={() => {}} mono /></Field>
          <Field label="Webhook URL">
            <div style={{ background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 7, padding: "8px 12px", fontFamily: "'IBM Plex Mono',monospace", fontSize: 11, color: "#38bdf8" }}>
              {`https://api.nia.app/webhooks/telegram/${tenant.id}`}
            </div>
          </Field>
        </div>
      </Channel>
      <Channel icon="🟦" name="Chatwoot" desc="Integración con Chatwoot como canal y plataforma de handoff" active={false} />
      <Channel icon="🔔" name="Microsoft Teams" desc="Notificaciones y handoff a equipos via Adaptive Cards" active={false} />
    </div>
  );
};

/* ─── Overview Tab ─── */
const OverviewTab = ({ tenant }) => (
  <div style={{ padding: 28, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, overflowY: "auto", alignItems: "start" }}>
    <div style={{ background: "#111118", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: 20 }}>
      <h3 style={{ fontSize: 12, color: "#666", letterSpacing: ".06em", textTransform: "uppercase", marginBottom: 16 }}>Información del tenant</h3>
      {[["ID", tenant.id, true], ["Nombre", tenant.name], ["Email contacto", tenant.contactEmail], ["Plan", tenant.plan], ["Estado", tenant.status], ["Config versión", `v${tenant.configVersion}`], ["Creado", new Date(tenant.createdAt).toLocaleDateString("es-CL")]].map(([k, v, mono]) => (
        <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
          <span style={{ fontSize: 12, color: "#666" }}>{k}</span>
          <span style={{ fontSize: 12, color: "#ccc", fontFamily: mono ? "'IBM Plex Mono',monospace" : "inherit" }}>{v}</span>
        </div>
      ))}
    </div>
    <div style={{ background: "#111118", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: 20 }}>
      <h3 style={{ fontSize: 12, color: "#666", letterSpacing: ".06em", textTransform: "uppercase", marginBottom: 16 }}>Límites de uso</h3>
      {Object.entries(tenant.limits || {}).map(([k, v]) => (
        <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
          <span style={{ fontSize: 12, color: "#666" }}>{k.replace(/([A-Z])/g, " $1").replace(/^./, s => s.toUpperCase())}</span>
          <span style={{ fontSize: 12, color: typeof v === "boolean" ? (v ? "#10b981" : "#ef4444") : "#ccc" }}>{typeof v === "boolean" ? (v ? "✓ sí" : "✗ no") : String(v)}</span>
        </div>
      ))}
    </div>
  </div>
);

/* ─── Tenant Detail ─── */
const TABS = [
  { id: "overview", label: "Overview" },
  { id: "fsm", label: "Flujo FSM" },
  { id: "widget", label: "Widget" },
  { id: "ai", label: "IA Config" },
  { id: "channels", label: "Canales" },
  { id: "analytics", label: "Analítica" },
];

const TenantDetail = ({ tenant, onBack }) => {
  const [tab, setTab] = useState("fsm");
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
      {/* Top bar */}
      <div style={{ padding: "14px 28px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 12, flexShrink: 0 }}>
        <button onClick={onBack} style={{ background: "transparent", border: "none", color: "#555", cursor: "pointer", fontSize: 18, padding: "0 4px" }}>←</button>
        <div>
          <p style={{ fontSize: 15, fontWeight: 600, color: "#e2e2f0" }}>{tenant.name}</p>
          <p style={{ fontSize: 11, color: "#555", fontFamily: "'IBM Plex Mono',monospace" }}>{tenant.id}</p>
        </div>
        <div style={{ display: "flex", gap: 6, marginLeft: 4 }}>
          <Badge color={tenant.plan}>{tenant.plan}</Badge>
          <Badge color={tenant.status}>{tenant.status}</Badge>
          {(tenant.channels || []).map(c => <Badge key={c} color={c}>{c}</Badge>)}
        </div>
        <div style={{ flex: 1 }} />
        <Btn small variant="danger">Suspender tenant</Btn>
        <Btn small variant="primary">Guardar todo</Btn>
      </div>
      {/* Tabs */}
      <div style={{ display: "flex", gap: 2, padding: "0 28px", borderBottom: "1px solid rgba(255,255,255,0.06)", flexShrink: 0 }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ padding: "12px 16px", border: "none", background: "transparent", color: tab === t.id ? "#818cf8" : "#555", fontSize: 13, fontWeight: tab === t.id ? 600 : 400, cursor: "pointer", fontFamily: "inherit", borderBottom: `2px solid ${tab === t.id ? "#6366f1" : "transparent"}`, transition: "color .15s", marginBottom: -1 }}>
            {t.label}
          </button>
        ))}
      </div>
      {/* Tab content */}
      <div style={{ flex: 1, overflow: "hidden" }}>
        {tab === "overview" && <OverviewTab tenant={tenant} />}
        {tab === "fsm" && <FSMTab tenant={tenant} />}
        {tab === "widget" && <WidgetTab tenant={tenant} />}
        {tab === "ai" && <AITab tenant={tenant} />}
        {tab === "channels" && <ChannelsTab tenant={tenant} />}
        {tab === "analytics" && <AnalyticsTab tenant={tenant} />}
      </div>
    </div>
  );
};

/* ─── App root ─── */
const App = () => {
  const [screen, setScreen] = useState("dashboard");
  const [tenant, setTenant] = useState(null);

  const selectTenant = (t) => { setTenant(t); setScreen("tenant-detail"); };
  const back = () => { setTenant(null); setScreen("tenants"); };

  return (
    <div style={{ display: "flex", height: "100vh", background: "#09090f", color: "#e2e2f0", fontFamily: "'IBM Plex Sans', sans-serif", overflow: "hidden" }}>
      <Sidebar screen={screen === "tenant-detail" ? "tenants" : screen} setScreen={setScreen} tenant={tenant} setTenant={setTenant} />
      <main style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {screen === "dashboard" && <Dashboard onSelectTenant={selectTenant} />}
        {screen === "tenants" && (
          <div style={{ padding: "28px 36px", overflowY: "auto" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
              <div>
                <h1 style={{ fontSize: 22, fontWeight: 600, color: "#e2e2f0", marginBottom: 4 }}>Tenants</h1>
                <p style={{ fontSize: 13, color: "#555" }}>{NIA.tenants.length} tenants configurados</p>
              </div>
              <Btn variant="primary">+ Nuevo tenant</Btn>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {NIA.tenants.map(t => (
                <div key={t.id} onClick={() => selectTenant(t)} style={{ background: "#111118", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: "16px 20px", display: "flex", alignItems: "center", gap: 16, cursor: "pointer", transition: "border-color .2s" }}
                  onMouseOver={e => e.currentTarget.style.borderColor = "rgba(99,102,241,0.3)"}
                  onMouseOut={e => e.currentTarget.style.borderColor = "rgba(255,255,255,0.06)"}>
                  <div style={{ width: 38, height: 38, borderRadius: 9, background: "rgba(99,102,241,0.15)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>◫</div>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontSize: 14, fontWeight: 500, color: "#e2e2f0", marginBottom: 3 }}>{t.name}</p>
                    <p style={{ fontSize: 11, color: "#555", fontFamily: "'IBM Plex Mono',monospace" }}>{t.id} · v{t.configVersion}</p>
                  </div>
                  <Badge color={t.plan}>{t.plan}</Badge>
                  <Badge color={t.status}>{t.status}</Badge>
                  <div style={{ display: "flex", gap: 4 }}>{(t.channels || []).map(c => <Badge key={c} color={c}>{c}</Badge>)}</div>
                  <span style={{ fontSize: 13, color: "#555" }}>{(t.analytics?.totalConvs || 0).toLocaleString()} convs</span>
                  <Btn small variant="ghost">Abrir →</Btn>
                </div>
              ))}
            </div>
          </div>
        )}
        {screen === "tenant-detail" && tenant && <TenantDetail tenant={tenant} onBack={back} />}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>

  <script>
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaksPanel').classList.add('visible');
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaksPanel').classList.remove('visible');
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    function setTweakScreen(val) {
      window.dispatchEvent(new CustomEvent('nia-tweak', { detail: { screen: val } }));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { initialScreen: val } }, '*');
    }
    function setTweakTenant(val) {
      window.dispatchEvent(new CustomEvent('nia-tweak', { detail: { tenant: val } }));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { initialTenant: val } }, '*');
    }
  </script>
</body>
</html>
