# Ejemplo .gitlab-ci.yml para tenant-manager
stages:
  - test
  - build
  - deploy-dev
  - deploy-staging
  - deploy-prod

variables:
  SERVICE_NAME: "tenant-manager"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE/$SERVICE_NAME"
  
# ─────────────────────────────────────────────────────────────────
# Testing
# ─────────────────────────────────────────────────────────────────
test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -r requirements.txt
    - pip install pytest pytest-asyncio
  script:
    - pytest tests/ -v
  coverage: '/TOTAL.*\s+(\d+%)$/'

# ─────────────────────────────────────────────────────────────────
# Build Docker Image
# ─────────────────────────────────────────────────────────────────
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA .
    - docker build -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE:latest
  only:
    - main
    - develop

# ─────────────────────────────────────────────────────────────────
# Deploy to Development (develop branch)
# ─────────────────────────────────────────────────────────────────
deploy-dev:
  stage: deploy-dev
  image: google/cloud-sdk:alpine
  before_script:
    - echo $GCP_SERVICE_KEY | base64 -d > gcp-key.json
    - gcloud auth activate-service-account --key-file gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - gcloud run deploy $SERVICE_NAME-dev
        --image $DOCKER_IMAGE:$CI_COMMIT_SHA
        --platform managed
        --region us-central1
        --port 8003
        --set-env-vars ENVIRONMENT=development
        --set-env-vars DATABASE_URL=$DEV_DATABASE_URL
        --set-env-vars REDIS_URL=$DEV_REDIS_URL
        --allow-unauthenticated
  environment:
    name: development
    url: https://$SERVICE_NAME-dev-xxx-uc.a.run.app
  only:
    - develop

# ─────────────────────────────────────────────────────────────────  
# Deploy to Staging (main branch)
# ─────────────────────────────────────────────────────────────────
deploy-staging:
  stage: deploy-staging
  image: google/cloud-sdk:alpine
  before_script:
    - echo $GCP_SERVICE_KEY | base64 -d > gcp-key.json
    - gcloud auth activate-service-account --key-file gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - gcloud run deploy $SERVICE_NAME-staging
        --image $DOCKER_IMAGE:$CI_COMMIT_SHA
        --platform managed
        --region us-central1  
        --port 8003
        --set-env-vars ENVIRONMENT=staging
        --set-env-vars DATABASE_URL=$STAGING_DATABASE_URL
        --set-env-vars REDIS_URL=$STAGING_REDIS_URL
        --allow-unauthenticated
  environment:
    name: staging
    url: https://$SERVICE_NAME-staging-xxx-uc.a.run.app
  when: manual
  only:
    - main

# ─────────────────────────────────────────────────────────────────
# Deploy to Production (tags)
# ─────────────────────────────────────────────────────────────────
deploy-prod:
  stage: deploy-prod
  image: google/cloud-sdk:alpine
  before_script:
    - echo $GCP_SERVICE_KEY | base64 -d > gcp-key.json
    - gcloud auth activate-service-account --key-file gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - gcloud run deploy $SERVICE_NAME
        --image $DOCKER_IMAGE:$CI_COMMIT_SHA
        --platform managed
        --region us-central1
        --port 8003
        --set-env-vars ENVIRONMENT=production
        --set-env-vars DATABASE_URL=$PROD_DATABASE_URL
        --set-env-vars REDIS_URL=$PROD_REDIS_URL
        --min-instances 1
        --max-instances 100
        --cpu 1
        --memory 512Mi
        --allow-unauthenticated
  environment:
    name: production
    url: https://$SERVICE_NAME-xxx-uc.a.run.app
  when: manual
  only:
    - tags