function bezierPath(fk,tk,off=0){
  const f=POS[fk],t=POS[tk];if(!f||!t)return"";
  const hw=NW/2,hh=NH/2,dx=t.x-f.x,dy=t.y-f.y,adx=Math.abs(dx),ady=Math.abs(dy);
  let x1,y1,x2,y2,c1x,c1y,c2x,c2y;
  if(adx>=ady){
    if(dx>0){x1=f.x+hw;y1=f.y+off*14;x2=t.x-hw;y2=t.y+off*14;c1x=x1+adx*.42;c1y=y1;c2x=x2-adx*.42;c2y=y2;}
    else{x1=f.x;y1=f.y-hh;x2=t.x;y2=t.y-hh;const up=Math.min(f.y,t.y)-85+off*22;c1x=f.x;c1y=up;c2x=t.x;c2y=up;}
  }else{
    if(dy>0){x1=f.x+off*14;y1=f.y+hh;x2=t.x+off*14;y2=t.y-hh;c1x=x1;c1y=y1+ady*.42;c2x=x2;c2y=y2-ady*.42;}
    else{x1=f.x+off*14;y1=f.y-hh;x2=t.x+off*14;y2=t.y+hh;c1x=x1;c1y=y1-ady*.42;c2x=x2;c2y=y2+ady*.42;}
  }
  return `M${x1},${y1} C${c1x},${c1y} ${c2x},${c2y} ${x2},${y2}`;
}
function midPt(fk,tk){const f=POS[fk],t=POS[tk];if(!f||!t)return{x:0,y:0};return{x:(f.x+t.x)/2,y:(f.y+t.y)/2};}

const Sparkline=({data,color="#6366f1",h=40})=>{
  if(!data||data.length<2)return<div style={{height:h}}/>;
  const max=Math.max(...data),min=Math.min(...data),w=200,rng=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/rng)*(h-4)-2}`).join(" ");
  return(<svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
    <polyline points={`0,${h} ${pts} ${w},${h}`} fill={`${color}18`} strokeWidth="0"/>
  </svg>);
};

/* ── FSM DIAGRAM ─────────────────────────────────────────────── */
const FSMDiagram=({tenant})=>{
  const [sel,setSel]=useState(null);
  const [pan,setPan]=useState({x:30,y:40});
  const [zoom,setZoom]=useState(0.82);
  const [drag,setDrag]=useState(null);
  const svgRef=useRef();

  const trEdges=[];
  const pairCount={};
  (tenant.transitions||[]).forEach((tr,i)=>{
    const froms=tr.from.length?tr.from:["discovery"];
    froms.forEach(fs=>{
      if(POS[fs]&&POS[tr.to]){
        const k=`${fs}→${tr.to}`;
        pairCount[k]=(pairCount[k]||0);
        trEdges.push({from:fs,to:tr.to,tr,idx:i,off:pairCount[k]-0.5});
        pairCount[k]++;
      }
    });
  });

  const onSvgDown=e=>{
    if(e.target===svgRef.current||e.target.dataset.bg){
      setDrag({sx:e.clientX-pan.x,sy:e.clientY-pan.y});
      setSel(null);
    }
  };
  const onMove=e=>{if(drag)setPan({x:e.clientX-drag.sx,y:e.clientY-drag.sy});};
  const onUp=()=>setDrag(null);
  const onWheel=e=>{e.preventDefault();setZoom(z=>Math.max(.35,Math.min(1.6,z-e.deltaY*.001)));};

  const panelW=sel?290:0;

  return(
    <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
      {/* SVG canvas */}
      <div style={{flex:1,position:"relative",background:"#07070c",overflow:"hidden"}}
        onMouseMove={onMove} onMouseUp={onUp} onWheel={onWheel}>

        {/* Top toolbar */}
        <div style={{position:"absolute",top:12,left:12,zIndex:10,display:"flex",gap:6,background:"rgba(15,15,22,.92)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,padding:"6px 8px",backdropFilter:"blur(12px)",alignItems:"center"}}>
          <Btn small variant="ghost" onClick={()=>{setPan({x:30,y:40});setZoom(.82);}}>⊞ Fit</Btn>
          <div style={{width:1,background:"rgba(255,255,255,.08)",height:20}}/>
          <Btn small variant="ghost" onClick={()=>setZoom(z=>Math.min(1.6,z+.1))}>＋</Btn>
          <span style={{fontSize:11,color:"#555",minWidth:38,textAlign:"center"}}>{Math.round(zoom*100)}%</span>
          <Btn small variant="ghost" onClick={()=>setZoom(z=>Math.max(.35,z-.1))}>－</Btn>
          <div style={{width:1,background:"rgba(255,255,255,.08)",height:20}}/>
          <Btn small variant="primary">＋ Estado</Btn>
          <Btn small variant="secondary">＋ Transición</Btn>
        </div>

        {/* Legend */}
        <div style={{position:"absolute",bottom:12,left:12,zIndex:10,display:"flex",gap:14,background:"rgba(15,15,22,.88)",border:"1px solid rgba(255,255,255,.07)",borderRadius:8,padding:"8px 14px",backdropFilter:"blur(10px)",alignItems:"center"}}>
          {Object.entries(ACOLOR).slice(0,6).map(([a,c])=>(
            <div key={a} style={{display:"flex",alignItems:"center",gap:5}}>
              <svg width="18" height="6"><line x1="0" y1="3" x2="14" y2="3" stroke={c} strokeWidth="2" strokeLinecap="round"/><polygon points="14,0 18,3 14,6" fill={c}/></svg>
              <span style={{fontSize:10,color:"#555"}}>{a}</span>
            </div>
          ))}
          <div style={{width:1,background:"rgba(255,255,255,.07)",height:16}}/>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <svg width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="#4b5563" strokeWidth="1.5" strokeDasharray="4,3"/></svg>
            <span style={{fontSize:10,color:"#444"}}>flujo base</span>
          </div>
        </div>

        <svg ref={svgRef} width="100%" height="100%" style={{cursor:drag?"grabbing":"grab"}} onMouseDown={onSvgDown}>
          <defs>
            <pattern id="grid" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
              <circle cx="11" cy="11" r=".7" fill="rgba(255,255,255,.07)"/>
            </pattern>
            {Object.entries(ACOLOR).map(([a,c])=>(
              <marker key={a} id={`ah-${a}`} viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">

              </marker>
            ))}
            <marker id="ah-def" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
              <path d="M0,1 L9,5 L0,9Z" fill="#4b5563"/>
            </marker>
          </defs>
          <rect width="100%" height="100%" fill="url(#grid)" data-bg="1"/>

          <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>
            {/* Default flow edges (dashed) */}
            {FLOW_EDGES.map((e,i)=>{
              const p=bezierPath(e.f,e.t);if(!p)return null;
              return <path key={i} d={p} fill="none" stroke={e.c} strokeWidth="1.4" strokeDasharray="5,4" opacity=".5" markerEnd="url(#ah-def)"/>;
            })}

            {/* Transition edges */}
            {trEdges.map((e,i)=>{
              const p=bezierPath(e.from,e.to,e.off);if(!p)return null;
              const c=ACOLOR[e.tr.action]||"#888";
              const isSel=sel?.type==="edge"&&sel.idx===e.idx;
              const mp=midPt(e.from,e.to);
              return(
                <g key={i} onClick={ev=>{ev.stopPropagation();setSel({type:"edge",idx:e.idx,data:e.tr});}}>
                  <path d={p} fill="none" stroke="transparent" strokeWidth="16" style={{cursor:"pointer"}}/>
                  <path d={p} fill="none" stroke={c} strokeWidth={isSel?2.8:1.9}
                    opacity={isSel?1:.8} markerEnd={`url(#ah-${e.tr.action})`}
                    style={{filter:isSel?`drop-shadow(0 0 5px ${c})`:"none",transition:"stroke-width .15s"}}/>
                  {/* Label pill */}
                  <foreignObject x={mp.x-50} y={mp.y-12} width="100" height="22" style={{overflow:"visible",pointerEvents:"none"}}>
                    <div xmlns="http://www.w3.org/1999/xhtml"
                      style={{background:`${c}20`,border:`1px solid ${c}50`,borderRadius:4,padding:"1px 7px",fontSize:9,color:c,textAlign:"center",fontFamily:"'IBM Plex Mono',monospace",backdropFilter:"blur(6px)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                      {e.tr.intent}
                    </div>
                  </foreignObject>
                </g>
              );
            })}

            {/* State nodes */}
            {Object.entries(POS).map(([sk,pos])=>{
              const st=SSTYLE[sk]||{c:"#888",bg:"#111",b:"#333",lbl:sk};
              const isSel=sel?.type==="state"&&sel.data===sk;
              const outN=trEdges.filter(e=>e.from===sk).length;
              const inN=trEdges.filter(e=>e.to===sk).length;
              return(
                <g key={sk} style={{cursor:"pointer"}} onClick={ev=>{ev.stopPropagation();setSel({type:"state",data:sk});}}>
                  {isSel&&<rect x={pos.x-NW/2-5} y={pos.y-NH/2-5} width={NW+10} height={NH+10} rx={NR+5} fill={st.b} opacity=".18"/>}
                  <rect x={pos.x-NW/2} y={pos.y-NH/2} width={NW} height={NH} rx={NR}
                    fill={st.bg} stroke={st.b} strokeWidth={isSel?2.2:1.5}
                    style={{filter:isSel?`drop-shadow(0 0 8px ${st.b}60)`:"none",transition:"all .15s"}}/>
                  {/* Left accent */}
                  <rect x={pos.x-NW/2} y={pos.y-NH/2+5} width={3} height={NH-10} rx={1.5} fill={st.b}/>
                  {/* Labels */}
                  <text x={pos.x-NW/2+13} y={pos.y-5} fill={st.c} fontSize="12" fontWeight="600" fontFamily="'IBM Plex Sans',sans-serif">{st.lbl}</text>
                  <text x={pos.x-NW/2+13} y={pos.y+11} fill={st.c} fontSize="9" opacity=".45" fontFamily="'IBM Plex Mono',monospace">{sk}</text>
                  {/* In/Out counts */}
                  <text x={pos.x+NW/2-9} y={pos.y-12} fill={st.c} fontSize="9" opacity=".55" textAnchor="middle" fontFamily="'IBM Plex Sans',sans-serif">{inN>0?`↓${inN}`:""}</text>
                  <text x={pos.x+NW/2-9} y={pos.y+20} fill={st.c} fontSize="9" opacity=".55" textAnchor="middle" fontFamily="'IBM Plex Sans',sans-serif">{outN>0?`↑${outN}`:""}</text>
                </g>
              );
            })}
          </g>
        </svg>
      </div>

      {/* Side panel */}
      {sel&&(
        <div style={{width:290,borderLeft:"1px solid rgba(255,255,255,.06)",background:"#0f0f18",overflowY:"auto",flexShrink:0,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"16px 18px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <p style={{fontSize:12,fontWeight:600,color:"#888",letterSpacing:".06em",textTransform:"uppercase"}}>{sel.type==="state"?"Estado":"Transición"}</p>
            <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:18}}>×</button>
          </div>

          {sel.type==="state"&&(()=>{
            const st=SSTYLE[sel.data]||{c:"#888",bg:"#111",b:"#333",lbl:sel.data};
            const ins=trEdges.filter(e=>e.to===sel.data);
            const outs=trEdges.filter(e=>e.from===sel.data);
            return(<div style={{padding:18,flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:st.bg,border:`1px solid ${st.b}`,borderRadius:8,marginBottom:18}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:st.b,flexShrink:0}}/>
                <div><p style={{fontSize:14,fontWeight:600,color:st.c}}>{st.lbl}</p><p style={{fontSize:10,color:st.c,opacity:.5,fontFamily:"'IBM Plex Mono',monospace"}}>{sel.data}</p></div>
              </div>
              <p style={{fontSize:10,color:"#555",letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>Entradas ({ins.length})</p>
              {ins.length===0&&<p style={{fontSize:12,color:"#444",marginBottom:14,fontStyle:"italic"}}>Estado inicial o raíz</p>}
              {ins.map((e,i)=><div key={i} style={{background:"rgba(255,255,255,.04)",borderRadius:6,padding:"7px 10px",marginBottom:5,fontSize:12,display:"flex",gap:6,alignItems:"center"}}>
                <span style={{color:"#666",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{e.from}</span>
                <span style={{color:ACOLOR[e.tr.action],fontSize:11,fontWeight:600}}>→ {e.tr.action}</span>
              </div>)}
              <p style={{fontSize:10,color:"#555",letterSpacing:".08em",textTransform:"uppercase",marginBottom:8,marginTop:14}}>Salidas ({outs.length})</p>
              {outs.length===0&&<p style={{fontSize:12,color:"#444",marginBottom:14,fontStyle:"italic"}}>Estado terminal</p>}
              {outs.map((e,i)=><div key={i} style={{background:"rgba(255,255,255,.04)",borderRadius:6,padding:"7px 10px",marginBottom:5,fontSize:12}}>
                <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:3}}>
                  <span style={{fontSize:10,background:`${ACOLOR[e.tr.action]}20`,color:ACOLOR[e.tr.action],padding:"1px 7px",borderRadius:3,fontFamily:"'IBM Plex Mono',monospace"}}>{e.tr.intent}</span>
                </div>
                <span style={{color:ACOLOR[e.tr.action],fontWeight:600}}>{e.tr.action}</span>
                <span style={{color:"#444",margin:"0 5px"}}>→</span>
                <span style={{color:"#777",fontFamily:"'IBM Plex Mono',monospace"}}>{e.to}</span>
              </div>)}
              <div style={{marginTop:18,display:"flex",gap:8}}>
                <Btn small variant="primary">＋ Transición</Btn>
                <Btn small variant="secondary">✎ Editar</Btn>
              </div>
            </div>);
          })()}

          {sel.type==="edge"&&sel.data&&(
            <div style={{padding:18}}>
              <Field label="Intent">
                <div style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.3)",borderRadius:6,padding:"8px 12px",fontSize:13,color:"#818cf8",fontFamily:"'IBM Plex Mono',monospace"}}>{sel.data.intent}</div>
              </Field>
              <Field label="Desde estados">
                {sel.data.from.length===0
                  ?<p style={{fontSize:12,color:"#666",fontStyle:"italic"}}>Cualquier estado (wildcard)</p>
                  :<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{sel.data.from.map(s=><span key={s} style={{fontSize:11,background:"rgba(255,255,255,.07)",color:"#888",padding:"2px 8px",borderRadius:4,fontFamily:"'IBM Plex Mono',monospace"}}>{s}</span>)}</div>}
              </Field>
              <Field label="Acción">
                <div style={{background:`${ACOLOR[sel.data.action]||"#888"}22`,border:`1px solid ${ACOLOR[sel.data.action]||"#888"}55`,borderRadius:6,padding:"8px 12px",color:ACOLOR[sel.data.action]||"#888",fontWeight:700,fontSize:13}}>{sel.data.action}</div>
              </Field>
              <Field label="Estado destino">
                <p style={{fontSize:13,color:"#ccc",fontFamily:"'IBM Plex Mono',monospace"}}>→ {sel.data.to}</p>
              </Field>
              {sel.data.prompt&&<Field label="Bot prompt"><Txa value={sel.data.prompt} onChange={()=>{}} rows={2}/></Field>}
              {sel.data.staticMsg&&<Field label="Mensaje estático"><Txa value={sel.data.staticMsg} onChange={()=>{}} rows={2}/></Field>}
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4,marginBottom:16}}>
                <Toggle value={sel.data.enabled} onChange={()=>{}}/><span style={{fontSize:12,color:"#888"}}>{sel.data.enabled?"Activa":"Inactiva"}</span>
              </div>
              <div style={{display:"flex",gap:7}}>
                <Btn small variant="secondary">✎ Editar</Btn>
                <Btn small variant="danger">Eliminar</Btn>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const DebugSimulator=({tenant})=>{
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [events,setEvents]=useState([]);
  const [loading,setLoading]=useState(false);
  const [convIdx,setConvIdx]=useState(0);
  const bodyRef=useRef();
  const logRef=useRef();

  const send=()=>{
    if(!input.trim())return;
    const userMsg=input;setInput("");
    const newMsgs=[...msgs,{role:"user",content:userMsg}];
    setMsgs(newMsgs);setLoading(true);
    const demo=DEBUG_CONV[convIdx%DEBUG_CONV.length];
    let delay=200;
    demo.events.forEach((ev,i)=>{
      setTimeout(()=>setEvents(e=>[...e,{...ev,ts:Date.now()}]),delay);
      delay+=Math.min(ev.t,400);
    });
    setTimeout(()=>{
      setMsgs(m=>[...m,{role:"bot",content:demo.reply}]);
      setLoading(false);setConvIdx(c=>c+1);
    },delay+300);
  };

  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[msgs,loading]);
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[events]);

  return(
    <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
      {/* Chat */}
      <div style={{width:380,borderRight:"1px solid rgba(255,255,255,.06)",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#10b981"}}/>
          <span style={{fontSize:12,fontWeight:600,color:"#888",letterSpacing:".06em",textTransform:"uppercase"}}>Simulador — {tenant.ui?.chatTitle||"Asistente"}</span>
          <div style={{flex:1}}/>
          <Btn small variant="ghost" onClick={()=>{setMsgs([]);setEvents([]);setConvIdx(0);}}>↺ Reset</Btn>
        </div>
        <div ref={bodyRef} style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10,background:"rgba(0,0,0,.2)"}}>
          {msgs.length===0&&<div style={{textAlign:"center",padding:"40px 20px"}}>
            <p style={{fontSize:24,marginBottom:8}}>💬</p>
            <p style={{fontSize:13,color:"#555"}}>Escribe un mensaje para simular la conversación</p>
            <p style={{fontSize:11,color:"#444",marginTop:6}}>Prueba: "Quiero reservar una nocturna para 4 personas"</p>
          </div>}
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",gap:8,alignItems:"flex-end",flexDirection:m.role==="bot"?"row":"row-reverse"}}>
              {m.role==="bot"&&<div style={{width:26,height:26,borderRadius:"50%",background:tenant.ui?.primaryColor||"#6366f1",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🤖</div>}
              <div style={{maxWidth:"82%",padding:"9px 13px",borderRadius:m.role==="bot"?"12px 12px 12px 3px":"12px 12px 3px 12px",background:m.role==="bot"?"rgba(255,255,255,.06)":tenant.ui?.primaryColor||"#6366f1",fontSize:12,lineHeight:1.6,color:"#e2e2f0",whiteSpace:"pre-wrap"}}>
                {m.content.replace(/\*\*(.*?)\*\*/g,"$1")}
              </div>
            </div>
          ))}
          {loading&&<div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:tenant.ui?.primaryColor||"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🤖</div>
            <div style={{background:"rgba(255,255,255,.06)",borderRadius:"12px 12px 12px 3px",padding:"12px 16px",display:"flex",gap:5}}>
              {[0,1,2].map(i=><span key={i} style={{width:7,height:7,borderRadius:"50%",background:"rgba(255,255,255,.3)",display:"inline-block",animation:`bounce .9s ${i*.18}s infinite`}}/>)}
            </div>
          </div>}
        </div>
        <div style={{padding:"12px 14px",borderTop:"1px solid rgba(255,255,255,.06)",display:"flex",gap:8,background:"rgba(0,0,0,.2)"}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Escribe un mensaje…"
            style={{flex:1,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:9,padding:"9px 13px",color:"#e2e2f0",fontSize:13,outline:"none"}}/>
          <button onClick={send} style={{width:38,height:38,background:tenant.ui?.primaryColor||"#6366f1",border:"none",borderRadius:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" width="16" height="16"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>

      {/* Event log */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:12,fontWeight:600,color:"#888",letterSpacing:".06em",textTransform:"uppercase"}}>Event Log</span>
          <div style={{flex:1}}/>
          <div style={{fontSize:11,color:"#555"}}>
            Total acumulado: <span style={{color:"#f59e0b",fontFamily:"'IBM Plex Mono',monospace"}}>${events.filter(e=>e.label==="Cost").reduce((a,e)=>{const m=e.val.match(/\$([\d.]+)/);return a+(m?parseFloat(m[1]):0);},0).toFixed(6)}</span>
          </div>
          <Btn small variant="ghost" onClick={()=>setEvents([])}>Limpiar</Btn>
        </div>
        <div ref={logRef} style={{flex:1,overflowY:"auto",padding:"10px 16px",fontFamily:"'IBM Plex Mono',monospace",fontSize:12}}>
          {events.length===0&&<div style={{padding:"40px 20px",textAlign:"center"}}>
            <p style={{fontSize:12,color:"#444"}}>Los eventos del FSM aparecerán aquí al enviar mensajes.</p>
          </div>}
          {events.map((ev,i)=>(
            <div key={i} style={{display:"flex",gap:10,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.04)",alignItems:"flex-start"}}>
              <span style={{color:"#555",minWidth:52,fontSize:11}}>{`+${Math.floor(Math.random()*200+50)}ms`}</span>
              <span style={{fontSize:14,flexShrink:0}}>{ev.icon}</span>
              <span style={{color:"#555",minWidth:70,fontSize:11,paddingTop:1}}>{ev.label}</span>
              <span style={{color:ev.c,flex:1,lineHeight:1.5,wordBreak:"break-all"}}>{ev.val}</span>
              {ev.score&&<span style={{color:"#555",fontSize:10,flexShrink:0}}>conf: {ev.score}</span>}
            </div>
          ))}
        </div>
      </div>
      <style>{`@keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.35}40%{transform:scale(1.1);opacity:1}}`}</style>
    </div>
  );
};

            </div>
            <div style={{height:4,background:"rgba(255,255,255,.06)",borderRadius:2}}>

/* ── SIDEBAR + APP ──────────────────────────────────────────── */
const TENANT_TABS=[
  {id:"fsm",label:"FSM Builder",icon:"◈"},
  {id:"skills",label:"Skills",icon:"⚙"},
  {id:"debug",label:"Debug",icon:"⬡"},
  {id:"widget",label:"Widget",icon:"◻"},
  {id:"analytics",label:"Analítica",icon:"▣"},
];

  const [tab,setTab]=useState(initTab||"fsm");
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"0 0 0 24px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:0,flexShrink:0,height:52}}>

          <p style={{fontSize:14,fontWeight:600,color:"#e2e2f0",lineHeight:1.2}}>{tenant.name}</p>

        </div>
        <div style={{display:"flex",gap:5,marginRight:14}}>
          <Badge color={tenant.plan}>{tenant.plan}</Badge>

              style={{height:"100%",padding:"0 16px",border:"none",background:"transparent",color:tab===t.id?"#818cf8":"#555",fontSize:13,fontWeight:tab===t.id?600:400,cursor:"pointer",fontFamily:"inherit",borderBottom:`2px solid ${tab===t.id?"#6366f1":"transparent"}`,transition:"color .15s",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
              <span style={{fontSize:11}}>{t.icon}</span>{t.label}

  <div style={{padding:"26px 32px",overflowY:"auto",flex:1}}>

    <p style={{fontSize:12,color:"#555",marginBottom:24}}>NIA Platform — visión general</p>
    <div style={{display:"flex",gap:12,marginBottom:26,flexWrap:"wrap"}}>
      <StatCard label="Tenants activos" value={TENANTS.filter(t=>t.status==="active").length} sub={`${TENANTS.length} total`} color="#10b981"/>
      <StatCard label="Conversaciones" value={TENANTS.reduce((a,t)=>a+(t.analytics?.convs||0),0).toLocaleString()} sub="todos los tenants" color="#6366f1"/>
      <StatCard label="Mensajes" value={TENANTS.reduce((a,t)=>a+(t.analytics?.msgs||0),0).toLocaleString()} color="#818cf8"/>
      <StatCard label="Costo total" value={`$${TENANTS.reduce((a,t)=>a+(t.analytics?.cost||0),0).toFixed(2)}`} sub="USD este mes" color="#f59e0b"/>
    </div>
    <div style={{background:"#111118",border:"1px solid rgba(255,255,255,.06)",borderRadius:10,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr style={{borderBottom:"1px solid rgba(255,255,255,.06)"}}>
          {["Tenant","Plan","Estado","Convs","NPS","Canales",""].map(h=><th key={h} style={{padding:"9px 16px",textAlign:"left",fontSize:10,color:"#444",fontWeight:600,letterSpacing:".07em",textTransform:"uppercase"}}>{h}</th>)}
        </tr></thead>
        <tbody>{TENANTS.map(t=>(
          <tr key={t.id} onClick={()=>onSelect(t)} style={{borderBottom:"1px solid rgba(255,255,255,.04)",cursor:"pointer"}}
            onMouseOver={e=>e.currentTarget.style.background="rgba(255,255,255,.025)"}
            onMouseOut={e=>e.currentTarget.style.background="transparent"}>
            <td style={{padding:"12px 16px"}}><p style={{fontSize:13,color:"#e2e2f0",fontWeight:500}}>{t.name}</p><p style={{fontSize:10,color:"#555",fontFamily:"'IBM Plex Mono',monospace"}}>{t.id}</p></td>
            <td style={{padding:"12px 16px"}}><Badge color={t.plan}>{t.plan}</Badge></td>
            <td style={{padding:"12px 16px"}}><Badge color={t.status}>{t.status}</Badge></td>
            <td style={{padding:"12px 16px",fontSize:13,color:"#ccc"}}>{(t.analytics?.convs||0).toLocaleString()}</td>
            <td style={{padding:"12px 16px",fontSize:13,color:t.analytics?.nps>=4?"#10b981":"#f59e0b"}}>{t.analytics?.nps?`★ ${t.analytics.nps}`:"—"}</td>
            <td style={{padding:"12px 16px"}}><div style={{display:"flex",gap:4}}>{(t.channels||[]).map(c=><Badge key={c} color={c}>{c}</Badge>)}</div></td>
            <td style={{padding:"12px 16px"}}><Btn small variant="ghost">Abrir →</Btn></td>
          </tr>
        ))}</tbody>
      </table>
    </div>
  </div>
);

const Sidebar=({screen,onNav,tenant})=>(
  <aside style={{width:214,background:"#0a0a10",borderRight:"1px solid rgba(255,255,255,.06)",display:"flex",flexDirection:"column",flexShrink:0}}>
    <div style={{padding:"20px 18px 16px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:10}}>
      <div style={{width:30,height:30,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff"}}>N</div>
      <div><div style={{fontSize:14,fontWeight:600,color:"#e2e2f0"}}>NIA</div><div style={{fontSize:9,color:"#444",letterSpacing:".1em"}}>ADMIN CONSOLE</div></div>
    </div>
    <nav style={{padding:"10px 8px",flex:1}}>
      {[{id:"dashboard",icon:"▣",label:"Dashboard"},{id:"tenants",icon:"◫",label:"Tenants"}].map(n=>(
        <button key={n.id} onClick={()=>onNav(n.id)}
          style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"8px 11px",borderRadius:7,border:"none",cursor:"pointer",background:screen===n.id?"rgba(99,102,241,.15)":"transparent",color:screen===n.id?"#818cf8":"#666",fontSize:13,fontWeight:screen===n.id?500:400,fontFamily:"inherit",marginBottom:2,textAlign:"left",transition:"background .15s"}}>
          <span style={{fontSize:14}}>{n.icon}</span>{n.label}

      {tenant&&<div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(255,255,255,.06)"}}>
        <p style={{fontSize:9,color:"#444",letterSpacing:".1em",padding:"0 11px",marginBottom:7}}>TENANT ACTIVO</p>
        <div style={{padding:"9px 11px",borderRadius:7,background:"rgba(255,255,255,.04)"}}>
          <p style={{fontSize:11,color:"#818cf8",fontWeight:500,marginBottom:2}}>{tenant.id}</p>
          <p style={{fontSize:10,color:"#555"}}>{tenant.name.slice(0,26)}…</p>
        </div>
      </div>}
    </nav>
    <div style={{padding:"12px 18px",borderTop:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:8}}>
      <div style={{width:24,height:24,borderRadius:"50%",background:"rgba(99,102,241,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#818cf8"}}>SA</div>
      <div><p style={{fontSize:11,color:"#ccc"}}>Super Admin</p><p style={{fontSize:9,color:"#444"}}>v2.5.0</p></div>
    </div>
  </aside>
);

const App=()=>{
  const [screen,setScreen]=useState("dashboard");
  const [tenant,setTenant]=useState(null);
  const [initTab,setInitTab]=useState("fsm");

  useEffect(()=>{
    const h=e=>{
      if(e.detail?.screen){
        const s=e.detail.screen;
        const tabMap={fsm:"fsm",skills:"skills",debug:"debug",analytics:"analytics"};
        if(tabMap[s]){setTenant(TENANTS[0]);setScreen("detail");setInitTab(s);}
        else{setScreen(s);setTenant(null);}
      }
      if(e.detail?.tenant){const t=TENANTS.find(x=>x.id===e.detail.tenant);if(t)setTenant(t);}
    };
    window.addEventListener("nia-tweak",h);return()=>window.removeEventListener("nia-tweak",h);
  },[]);

  return(
    <div style={{display:"flex",height:"100vh",background:"#09090f",color:"#e2e2f0",fontFamily:"'IBM Plex Sans',sans-serif",overflow:"hidden"}}>
      <Sidebar screen={screen==="detail"?"tenants":screen} onNav={s=>{setScreen(s);setTenant(null);}} tenant={tenant}/>
      <main style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {screen==="dashboard"&&<Dashboard onSelect={t=>{setTenant(t);setScreen("detail");}}/>}
        {screen==="tenants"&&(
          <div style={{padding:"26px 32px",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <div><h1 style={{fontSize:21,fontWeight:600,color:"#e2e2f0",marginBottom:3}}>Tenants</h1><p style={{fontSize:12,color:"#555"}}>{TENANTS.length} configurados</p></div>
              <Btn variant="primary">＋ Nuevo tenant</Btn>
            </div>
            {TENANTS.map(t=>(
              <div key={t.id} onClick={()=>{setTenant(t);setScreen("detail");}}
                style={{background:"#111118",border:"1px solid rgba(255,255,255,.06)",borderRadius:10,padding:"14px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",marginBottom:9,transition:"border-color .2s"}}
                onMouseOver={e=>e.currentTarget.style.borderColor="rgba(99,102,241,.3)"}
                onMouseOut={e=>e.currentTarget.style.borderColor="rgba(255,255,255,.06)"}>
                <div style={{width:36,height:36,borderRadius:8,background:"rgba(99,102,241,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>◫</div>
                <div style={{flex:1}}><p style={{fontSize:13,fontWeight:500,color:"#e2e2f0",marginBottom:2}}>{t.name}</p><p style={{fontSize:10,color:"#555",fontFamily:"'IBM Plex Mono',monospace"}}>{t.id} · v{t.cv}</p></div>
                <Badge color={t.plan}>{t.plan}</Badge><Badge color={t.status}>{t.status}</Badge>
                <div style={{display:"flex",gap:4}}>{(t.channels||[]).map(c=><Badge key={c} color={c}>{c}</Badge>)}</div>
                <span style={{fontSize:12,color:"#555"}}>{(t.analytics?.convs||0).toLocaleString()} convs</span>
                <Btn small variant="ghost">Abrir →</Btn>
              </div>
            ))}
          </div>
        )}
        {screen==="detail"&&tenant&&<TenantDetail tenant={tenant} onBack={()=>{setScreen("tenants");}} initTab={initTab}/>}
      </main>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
window.addEventListener('message',e=>{
  if(e.data?.type==='__activate_edit_mode')document.getElementById('tweaksPanel').classList.add('on');
  if(e.data?.type==='__deactivate_edit_mode')document.getElementById('tweaksPanel').classList.remove('on');
});
window.parent.postMessage({type:'__edit_mode_available'},'*');
function dispTweak(k,v){window.dispatchEvent(new CustomEvent('nia-tweak',{detail:{[k]:v}}));window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');}
</script>
</body>
</html>
