# .gitlab-ci.yml para monorepo con deploy selectivo
stages:
  - test
  - build
  - deploy-dev
  - deploy-staging  
  - deploy-prod

variables:
  GCP_PROJECT_ID: "tu-proyecto-gcp"
  GCP_REGION: "us-central1"

# ─────────────────────────────────────────────────────────────────
# Detectar cambios por servicio
# ─────────────────────────────────────────────────────────────────
.changes_template: &changes_template
  rules:
    - changes:
        - "services/${SERVICE}/**/*"
        - "shared/**/*"  # shared afecta a todos
      when: on_success
    - when: never

# ─────────────────────────────────────────────────────────────────
# Templates para cada servicio
# ─────────────────────────────────────────────────────────────────
.service_build: &service_build
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - cd services/$SERVICE
    - docker build -t $CI_REGISTRY_IMAGE/$SERVICE:$CI_COMMIT_SHA .
    - docker build -t $CI_REGISTRY_IMAGE/$SERVICE:latest .
    - docker push $CI_REGISTRY_IMAGE/$SERVICE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/$SERVICE:latest

.service_deploy_dev: &service_deploy_dev
  stage: deploy-dev
  image: google/cloud-sdk:alpine
  before_script:
    - echo $GCP_SERVICE_KEY | base64 -d > gcp-key.json
    - gcloud auth activate-service-account --key-file gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - gcloud run deploy ${SERVICE}-dev
        --image $CI_REGISTRY_IMAGE/$SERVICE:$CI_COMMIT_SHA
        --platform managed
        --region $GCP_REGION
        --port $PORT
        --set-env-vars ENVIRONMENT=development
        --set-env-vars DATABASE_URL=$DEV_DATABASE_URL
        --set-env-vars REDIS_URL=$DEV_REDIS_URL
        --allow-unauthenticated
  environment:
    name: development
    url: https://${SERVICE}-dev-xxx-uc.a.run.app
  only:
    - develop

# ─────────────────────────────────────────────────────────────────
# Tenant Manager Service
# ─────────────────────────────────────────────────────────────────
build-tenant-manager:
  <<: *service_build
  variables:
    SERVICE: "tenant-manager"
  <<: *changes_template

deploy-tenant-manager-dev:
  <<: *service_deploy_dev
  variables:
    SERVICE: "tenant-manager" 
    PORT: "8003"
  <<: *changes_template
  needs: ["build-tenant-manager"]

# ─────────────────────────────────────────────────────────────────
# Orchestrator Service  
# ─────────────────────────────────────────────────────────────────
build-orchestrator:
  <<: *service_build
  variables:
    SERVICE: "orchestrator"
  <<: *changes_template

deploy-orchestrator-dev:
  <<: *service_deploy_dev
  variables:
    SERVICE: "orchestrator"
    PORT: "8001" 
  <<: *changes_template
  needs: ["build-orchestrator"]

# ─────────────────────────────────────────────────────────────────
# RAG Service
# ─────────────────────────────────────────────────────────────────
build-rag-service:
  <<: *service_build
  variables:
    SERVICE: "rag-service"
  <<: *changes_template

deploy-rag-service-dev:
  <<: *service_deploy_dev
  variables:
    SERVICE: "rag-service"
    PORT: "8002"
  <<: *changes_template  
  needs: ["build-rag-service"]

# ─────────────────────────────────────────────────────────────────
# Model Adapter Service
# ─────────────────────────────────────────────────────────────────
build-model-adapter:
  <<: *service_build
  variables:
    SERVICE: "model-adapter"
  <<: *changes_template

deploy-model-adapter-dev:
  <<: *service_deploy_dev
  variables:
    SERVICE: "model-adapter"
    PORT: "8005"
  <<: *changes_template
  needs: ["build-model-adapter"]

